name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout and install
        uses: ./.github/actions/setup-pnpm-node

      - name: Type check
        run: pnpm typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout and install
        uses: ./.github/actions/setup-pnpm-node

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Comment coverage on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v8
        env:
          COVERAGE_SUMMARY: coverage/coverage-summary.json
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const fs = require('node:fs');
              const path = require('node:path');

              const marker = '<!-- falso-coverage-comment -->';
              const summaryPath = path.join(process.cwd(), process.env.COVERAGE_SUMMARY);

              let body = `${marker}\n## Coverage\n\n`;

              if (fs.existsSync(summaryPath)) {
                const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
                const totals = summary.total ?? {};
                const format = (value) => (typeof value === 'number' ? `${value.toFixed(2)}%` : 'n/a');

                body += [
                  '| Metric | Coverage |',
                  '| --- | ---: |',
                  `| Lines | ${format(totals.lines?.pct)} |`,
                  `| Statements | ${format(totals.statements?.pct)} |`,
                  `| Functions | ${format(totals.functions?.pct)} |`,
                  `| Branches | ${format(totals.branches?.pct)} |`,
                ].join('\n');
              } else {
                body += 'Coverage summary was not generated.';
              }

              const { owner, repo } = context.repo;
              const issue_number = context.issue.number;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.body?.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              console.warn(`Skipping coverage comment: ${error.message}`);
            }

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - test
    steps:
      - name: Checkout and install
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm build

name: Setup pnpm and Node.js
description: Checkout the repository, install pnpm, set up Node.js, and install dependencies.

inputs:
  node-version:
    description: Node.js version
    required: false
    default: 22.12.0
  pnpm-version:
    description: pnpm version
    required: false
    default: 10.33.2
  fetch-depth:
    description: Git fetch depth for checkout
    required: false
    default: "1"
  ref:
    description: Optional git ref to checkout
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Checkout repository
      if: ${{ inputs.ref == '' }}
      uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Checkout repository at ref
      if: ${{ inputs.ref != '' }}
      uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        ref: ${{ inputs.ref }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
